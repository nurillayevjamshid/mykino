<!doctype html>
<html lang="uz" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fafafb" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Kino Play</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260512-music-nav" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <div id="splashScreen" class="splash-screen">
    <img src="/static/assets/splash.jpg?v=20260509" alt="Kino Play" />
    <div class="splash-overlay"></div>
  </div>
  <main class="app-shell" id="appShell" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
    <header class="topbar">
      <div class="brand" aria-label="Kino Play">
        <span class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" class="brand-logo__svg">
            <circle cx="16" cy="16" r="14.4" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
            <path d="M13 11.4 22.2 16 13 20.6Z" fill="currentColor"></path>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-text__top">KINO</span>
          <span class="brand-text__bottom">PLAY</span>
        </span>
      </div>
      <div class="topbar-controls">
        <div class="topbar-search">
          <button class="icon-button icon-button--top topbar-search__trigger" type="button" data-action="search" aria-label="Qidirish">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
          </button>
          <section class="search-panel topbar-search__panel" id="searchPanel" hidden>
            <label class="search-box glass-panel">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M20 20l-3.5-3.5"></path>
              </svg>
              <input id="searchInput" type="search" placeholder="Kino qidirish" autocomplete="off" />
            </label>
          </section>
        </div>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-trigger" type="button" aria-label="Tilni tanlash">
            <span class="lang-current">UZ</span>
            <svg class="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="lang-options">
            <button class="lang-option is-active" data-value="uz">
              <span class="lang-radio"></span>
              <span class="lang-name">UZ</span>
            </button>
            <button class="lang-option" data-value="ru">
              <span class="lang-radio"></span>
              <span class="lang-name">RU</span>
            </button>
            <button class="lang-option" data-value="en">
              <span class="lang-radio"></span>
              <span class="lang-name">ENG</span>
            </button>
          </div>
        </div>
        <button class="theme-toggle" type="button" data-theme="light" aria-label="Kunduzgi/Kechki rejim">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="hero" id="heroSection" hidden>
      <div class="hero__bg" id="heroBackdrop"></div>
      <div class="hero__shimmer" id="heroShimmer"></div>
      <div class="hero__gradient"></div>
      <div class="hero__inner">
        <h1 class="hero__title" id="heroTitle"></h1>
        <p class="hero__desc" id="heroDescription"></p>
        <div class="hero__actions">
          <button class="hero__play" id="heroPlayButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="m8 5 12 7-12 7z"></path></svg>
            <span id="heroPlayLabel">Ko'rish</span>
          </button>
          <button class="hero__info" id="heroInfoButton" type="button" aria-label="Batafsil">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section class="movie-grid" id="movieGrid" aria-live="polite"></section>

    <footer class="app-footer" aria-label="Sayt ma'lumotlari">
      <div class="app-footer__brand">
        <span class="app-footer__logo" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <circle cx="16" cy="16" r="14.4" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
            <path d="M13 11.4 22.2 16 13 20.6Z" fill="currentColor"></path>
          </svg>
        </span>
        <span class="app-footer__name">KINO PLAY</span>
      </div>
      <p class="app-footer__tagline" id="footerTagline">Eng sara kinolar mini-ilovasi</p>
      <p class="app-footer__copy" id="footerCopy">&copy; 2026 Kino Play. Barcha huquqlar himoyalangan.</p>
    </footer>

    <nav class="bottom-bar" aria-label="Mini app menyusi">
      <div class="bottom-bar__inner">
        <button class="bottom-bar__button is-active" type="button" data-filter="all" aria-label="Kino" title="Kino">
          <svg class="icon-svg cinema-nav-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path class="cinema-nav-icon__stroke" d="M18 8c12 7 19 18 21 33"></path>
            <path class="cinema-nav-icon__stroke" d="M30 5c12 8 19 20 20 36"></path>
            <path class="cinema-nav-icon__stroke cinema-nav-icon__stripe" d="m20 18 14-8"></path>
            <path class="cinema-nav-icon__stroke cinema-nav-icon__stripe" d="m24 30 18-11"></path>
            <path class="cinema-nav-icon__fill" d="M36 20a19 19 0 1 1 0 38 19 19 0 0 1 0-38Z"></path>
            <circle class="cinema-nav-icon__cut" cx="36" cy="39" r="4"></circle>
            <circle class="cinema-nav-icon__cut" cx="36" cy="27" r="5"></circle>
            <circle class="cinema-nav-icon__cut" cx="48" cy="39" r="5"></circle>
            <circle class="cinema-nav-icon__cut" cx="36" cy="51" r="5"></circle>
            <circle class="cinema-nav-icon__cut" cx="24" cy="39" r="5"></circle>
          </svg>
          <span class="bottom-bar__label">Kino</span>
        </button>
        <button class="bottom-bar__button" type="button" data-action="categories" aria-label="Musiqa" title="Musiqa">
          <svg class="icon-svg music-nav-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M31.4 6h7.2v10.1c0 4.9 2.6 8.7 8.4 13.3 8.3 6.6 11.2 15.9 7.9 25.9-.5 1.5-1.1 2.8-1.8 4h-5.3c2.7-6.2 2.1-13.3-1.9-18.8-2-2.8-4.4-5-7.3-7.1v17.7c0 6.9-7.2 12.5-16.1 12.5s-16.1-5.6-16.1-12.5 7.2-12.5 16.1-12.5c3.3 0 6.4.8 8.9 2.2V6Z"></path>
          </svg>
          <span class="bottom-bar__label">Musiqa</span>
        </button>
        <button class="bottom-bar__button" type="button" data-action="catalog" aria-label="TV" title="TV">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="18" height="12" rx="2"></rect>
            <path d="M8 3h8"></path>
            <path d="m10 10 5 2-5 2z"></path>
          </svg>
          <span class="bottom-bar__label">TV</span>
        </button>
        <button class="bottom-bar__button" type="button" data-action="favorites" aria-label="Sevimlilar" title="Sevimlilar">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span class="bottom-bar__label">Sevimlilar</span>
        </button>
        <button class="bottom-bar__button profile-trigger" type="button" data-action="profile" aria-label="Profil" title="Profil">
          <span class="bottom-bar__avatar">
            <img class="profile-trigger__photo" id="headerAvatarPhoto" alt="Telegram user" hidden />
            <span class="profile-trigger__initials" id="headerAvatar">KI</span>
          </span>
          <span class="bottom-bar__label">Profil</span>
        </button>
      </div>
    </nav>
  </main>

  <dialog class="movie-modal" id="movieModal">
    <button class="modal-close" type="button" data-close aria-label="Yopish">
      <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
    </button>
    <div class="modal-poster" id="modalPoster"></div>
    <div class="modal-content">
      <div class="modal-meta" id="modalMeta"></div>
      <h1 id="modalTitle"></h1>
      <p id="modalDescription"></p>
      <div class="modal-actions">
        <button class="watch-button" id="watchButton" type="button">Tomosha qilish</button>
        <button class="ghost-button" type="button" data-close>Keyinroq</button>
      </div>
    </div>
  </dialog>

  <dialog class="profile-modal" id="profileModal">
    <button class="modal-close" type="button" data-close-profile aria-label="Yopish">
      <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
    </button>
    <div class="profile-card">
      <div class="profile-identity">
        <div class="avatar-shell">
          <img class="avatar-photo" id="avatarPhoto" alt="Telegram user" hidden />
          <div class="avatar" id="avatar">KI</div>
        </div>
        <div class="profile-copy">
          <h2 id="profileName">Kino foydalanuvchi</h2>
          <p class="profile-username" id="profileUsername">@mykino</p>
        </div>
      </div>

      <div class="profile-stats">
        <div class="profile-stat">
          <span>Ko'rilgan kinolar</span>
          <b id="viewCount">0</b>
        </div>
      </div>

      <section class="profile-history">
        <div class="profile-history__head">
          <div class="profile-history__meta">
            <strong id="watchedHistoryTitle">Ko'rilgan kinolar</strong>
            <span id="watchedMovieCount">0 ta</span>
          </div>
          <button class="profile-history__clear" id="clearHistoryButton" type="button">Tozalash</button>
        </div>
        <div class="profile-history__list" id="watchedMovieList"></div>
        <p class="profile-history__empty" id="watchedMovieEmpty">Hali ko'rilgan kino yo'q.</p>
      </section>
    </div>
  </dialog>

  <section class="video-player" id="videoPlayer" role="dialog" aria-modal="true" aria-label="Video player" hidden>
    <header class="video-player__topbar">
      <button class="video-player__close" type="button" data-video-close aria-label="Orqaga">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <div class="video-player__title">
        <strong id="videoTitle">Kino</strong>
        <span id="videoSourceLabel">Video manba</span>
      </div>
      <button class="video-player__close" type="button" data-video-close aria-label="Yopish">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </header>

    <div class="video-player__stage">
      <div class="video-loading" id="videoLoading" role="status">
        <span></span>
        <b>Video yuklanmoqda...</b>
      </div>

      <div class="video-mount" id="videoMount"></div>

      <button class="video-player__center-action" id="videoCenterAction" type="button" hidden aria-label="Play">
        <svg class="icon-svg icon-svg--solid" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m8 6 10 6-10 6z"></path>
        </svg>
      </button>

      <div class="video-player__controls glass-panel" id="videoControls" hidden>
        <div class="video-progress-panel">
          <span class="video-time" id="videoCurrentTime">0:00</span>
          <input class="video-progress__range" id="videoSeek" type="range" min="0" max="1000" value="0" step="1"
            aria-label="Video progress" />
          <span class="video-time" id="videoDuration">0:00</span>
        </div>

        <div class="video-command-row">
          <div class="video-volume-pill">
            <button class="player-inline-button" id="videoMuteButton" type="button" aria-label="Mute"
              data-state="sound">
              <svg class="icon-svg icon-state icon-state--sound" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 5 6 9H3v6h3l5 4z"></path>
                <path d="M16 9a5 5 0 0 1 0 6"></path>
                <path d="M18.5 6.5a8.5 8.5 0 0 1 0 11"></path>
              </svg>
              <svg class="icon-svg icon-state icon-state--mute" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 5 6 9H3v6h3l5 4z"></path>
                <path d="m16 9 5 6"></path>
                <path d="m21 9-5 6"></path>
              </svg>
            </button>
            <input class="video-volume__range" id="videoVolume" type="range" min="0" max="100" value="100" step="1"
              aria-label="Volume" />
            <span class="video-volume__value" id="videoVolumeValue">100%</span>
          </div>

          <div class="video-main-controls">
            <button class="player-icon-button" id="videoBackButton" type="button" aria-label="-10 sekund">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 8 7 12l4 4"></path>
                <path d="M5 12a7 7 0 1 0 2-4.9"></path>
              </svg>
              <span class="player-icon-button__badge">10</span>
            </button>
            <button class="player-icon-button player-icon-button--primary" id="videoToggleButton" type="button"
              aria-label="Play" data-state="play">
              <svg class="icon-svg icon-svg--solid icon-state icon-state--play" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m8 6 10 6-10 6z"></path>
              </svg>
              <svg class="icon-svg icon-svg--solid icon-state icon-state--pause" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 6h2v12H9z"></path>
                <path d="M13 6h2v12h-2z"></path>
              </svg>
            </button>
            <button class="player-icon-button" id="videoForwardButton" type="button" aria-label="+10 sekund">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m13 8 4 4-4 4"></path>
                <path d="M19 12a7 7 0 1 1-2-4.9"></path>
              </svg>
              <span class="player-icon-button__badge">10</span>
            </button>
          </div>

          <div class="video-extra-controls">
            <button class="player-inline-button" id="videoPrevButton" type="button" aria-label="Oldingi kino">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 19 2 12l9-7v14z"></path>
                <path d="M22 19 13 12l9-7v14z"></path>
              </svg>
            </button>
            <button class="player-inline-button" id="videoNextButton" type="button" aria-label="Keyingi kino">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m13 5 9 7-9 7V5z"></path>
                <path d="m2 5 9 7-9 7V5z"></path>
              </svg>
            </button>
            <label class="video-speed-wrap">
              <span class="sr-only">Speed</span>
              <select class="video-speed" id="videoSpeed" aria-label="Speed">
                <option value="1">1x</option>
              </select>
            </label>
            <button class="player-inline-button" id="videoFullscreenButton" type="button" aria-label="Full"
              data-state="enter">
              <svg class="icon-svg icon-state icon-state--enter" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 3H4v4"></path>
                <path d="M16 3h4v4"></path>
                <path d="M4 16v5h4"></path>
                <path d="M20 16v5h-4"></path>
              </svg>
              <svg class="icon-svg icon-state icon-state--exit" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 9H4V4"></path>
                <path d="M15 9h5V4"></path>
                <path d="M4 20v-5h5"></path>
                <path d="M20 20v-5h-5"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="video-fallback" id="videoFallback" hidden>
        <strong id="videoFallbackText" hidden></strong>
        <a id="videoExternalLink" target="_blank" rel="noreferrer" hidden>Manbani ochish</a>
      </div>
    </div>
  </section>

  <script src="/static/app.js?v=20260512-music-nav"></script>
</body>

</html>
